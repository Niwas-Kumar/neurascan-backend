# Firebase & Firestore Configuration
firebase.config-path=serviceAccountKey.json

# Firestore Performance Tuning
# Connection pooling and timeout settings for Firestore queries
firestore.max-retries=3
firestore.query-timeout-seconds=30
firestore.batch-size=10
firestore.connection-max-idle-minutes=5

# JVM/Tomcat Thread Pool Configuration
server.tomcat.threads.max=300
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# File Upload
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT - CRITICAL: Ensure JWT_SECRET is set via environment variable in production!
jwt.secret=${JWT_SECRET:neurascan_super_secret_key_2024_change_in_production_must_be_long_enough_for_hs256}
# JWT expiration: 7 days (604800000ms) - balances security and UX
jwt.expiration=604800000
# Refresh threshold: Refresh token if less than 1 day remaining (86400000ms)
jwt.refresh-threshold=86400000

# Python AI Microservice (Deployed on Hugging Face Spaces)
# Set AI_SERVICE_URL env var to your HF Space URL: https://YOUR-USERNAME-neurascan-ai.hf.space/analyze
ai.service.url=${AI_SERVICE_URL:https://neurascan-python-ai.onrender.com/analyze}
ai.service.timeout=${AI_SERVICE_TIMEOUT_MS:10000}

# Feature flags (env-driven)
feature.consent.enabled=${FEATURE_CONSENT_ENABLED:false}
feature.risk.explanation.enabled=${FEATURE_RISK_EXPLANATION_ENABLED:false}
feature.teacher.recommendations.enabled=${FEATURE_TEACHER_RECOMMENDATIONS_ENABLED:false}
feature.export.auditlog.enabled=${FEATURE_EXPORT_AUDITLOG_ENABLED:false}
feature.offline.mode.enabled=${FEATURE_OFFLINE_MODE_ENABLED:false}
feature.admin.panel.enabled=${FEATURE_ADMIN_PANEL_ENABLED:true}

# Admin default credentials (change in production!)
admin.default.email=${ADMIN_EMAIL:admin@neurascan.com}
admin.default.password=${ADMIN_PASSWORD:Admin@123}
admin.default.name=${ADMIN_NAME:NeuraScan Admin}

# Frontend URL (used in password reset email links)
app.frontend.url=${APP_FRONTEND_URL:https://neurascan-frontend-blond.vercel.app}

# Email / SendGrid
# Set these environment variables in production:
# - SENDGRID_API_KEY (required, format: SG.xxxxxxxxxxxxx)
# - SENDGRID_FROM_EMAIL (required, must be verified in SendGrid - e.g., noreply@yourdomain.com or your personal email)
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:}

# Logging
logging.level.com.ai.learningdetection=INFO
logging.level.org.springframework.security=WARN

# Firebase / Google Auth
google.client-id=${GOOGLE_CLIENT_ID:147645341441-mq9bsncu8jrii4epqr5dct6oj419a4d6.apps.googleusercontent.com}

# Server port
server.port=${PORT:8080}

# Health check endpoint for deployment platforms (Render, Heroku, etc.)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# CORS - allowed frontend origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://neurascan.vercel.app}

# Stripe Billing (set in production environment)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.basic=${STRIPE_PRICE_BASIC:}
stripe.price.pro=${STRIPE_PRICE_PRO:}
stripe.price.enterprise=${STRIPE_PRICE_ENTERPRISE:}
app.frontend-url=${APP_FRONTEND_URL:https://neurascan-frontend-blond.vercel.app}

# File upload size limit for CSV import
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
