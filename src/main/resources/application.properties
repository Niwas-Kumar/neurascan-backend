# Firebase
firebase.config-path=serviceAccountKey.json


# File Upload
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT
jwt.secret=${JWT_SECRET:neurascan_super_secret_key_2024_change_in_production_must_be_long_enough_for_hs256}
jwt.expiration=86400000

# Python AI Microservice
ai.service.url=${AI_SERVICE_URL:http://localhost:5000/analyze}

# Frontend URL (used in password reset email links)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# Email / SMTP (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Logging
logging.level.com.ai.learningdetection=INFO
logging.level.org.springframework.security=WARN

# Firebase / Google Auth
google.client-id=${GOOGLE_CLIENT_ID:147645341441-mq9bsncu8jrii4epqr5dct6oj419a4d6.apps.googleusercontent.com}

# Server port
server.port=${PORT:8080}

# CORS - allowed frontend origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000}
